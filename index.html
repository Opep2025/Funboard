<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funboard | Scanmaster Edition</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Geist+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --ai-primary: #8b5cf6;
            --ai-secondary: #d946ef;
            --bg-base: #0f172a;
            --bg-panels: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-light: rgba(255, 255, 255, 0.1);
            --gradient-premium: linear-gradient(135deg, var(--ai-primary), var(--ai-secondary));
            --glow-premium: 0 0 20px rgba(139, 92, 246, 0.3);
            --ease-premium: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg-base); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden;
            transition: filter 0.5s ease;
        }

        .glass-panel {
            background: var(--bg-panels);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-light);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }
        
        header { 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            margin-bottom: 30px;
            gap: 20px;
        }
        
        /* Banner-Logo Styling */
        .brand-banner {
            width: 100%;
            max-width: 800px;
            height: auto;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.3s var(--ease-premium);
            border: 1px solid var(--border-light);
        }
        .brand-banner:hover {
            transform: scale(1.01);
        }

        .editor-area { padding: 20px; margin-bottom: 30px; }
        textarea {
            width: 100%; height: 120px;
            background: rgba(0,0,0,0.2); border: 1px solid var(--border-light);
            color: white; border-radius: 12px; padding: 15px; margin: 15px 0;
            font-family: inherit; resize: none; outline: none;
        }

        .post-card { padding: 25px; margin-bottom: 20px; animation: slideIn 0.5s var(--ease-premium); }

        /* Verborgener Text Effekt */
        .hidden-text {
            position: relative; display: inline-block; color: transparent; 
            background: rgba(255, 255, 255, 0.05); border-radius: 4px; padding: 0 6px;
            cursor: help; transition: all 0.4s; filter: blur(10px); user-select: none;
        }
        .hidden-text::before {
            content: 'VERBORGENER TEXT'; position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.6rem; font-family: 'Geist Mono'; color: var(--ai-primary);
        }
        .hidden-text.revealed { color: var(--text-main); filter: blur(0); background: rgba(139, 92, 246, 0.1); user-select: text; }
        .hidden-text.revealed::before { opacity: 0; }

        .btn-ui {
            background: none; border: 1px solid var(--border-light); color: white;
            padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 0.7rem;
            transition: all 0.3s; font-family: 'Geist Mono';
            text-transform: uppercase;
        }
        .btn-ui:hover { border-color: var(--ai-primary); color: var(--ai-primary); box-shadow: var(--glow-premium); }

        #masterConsole {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: #000; color: #0f0; font-family: 'Geist Mono';
            font-size: 10px; padding: 8px; z-index: 9999; display: none; border-top: 1px solid #0f0;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <canvas id="ambientCanvas" style="position:fixed; inset:0; z-index:-1; pointer-events:none; opacity:0.2;"></canvas>

    <div class="container">
        <header>
            <img src="https://files.oaiusercontent.com/file-K1N682tZ7uWz1f7P8v2k2?se=2024-05-15T10%3A00%3A00Z&sp=r&sv=2021-08-06&sr=b&rscc=max-age%3D31536000%2C%20private%2C%20immutable&rscd=attachment%3B%20filename%3Dfunboard_banner.png&sig=xyz" 
                 alt="Funboard Banner" 
                 class="brand-banner" 
                 onclick="location.reload()"
                 onerror="this.src='https://via.placeholder.com/800x250/1e293b/8b5cf6?text=Funboard+|+Scanmaster+Edition'">
            
            <div style="display: flex; gap: 10px;">
                <button class="btn-ui" onclick="GhostBackup.exportData()">💾 SICHERUNG</button>
            </div>
        </header>

        <div class="glass-panel" style="padding: 20px; margin-bottom: 20px; border-left: 4px solid var(--ai-primary);">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span style="font-family: 'Geist Mono'; font-size: 0.7rem; letter-spacing: 1px;">NEURALE ANALYSE</span>
                <button class="btn-ui" onclick="generateSummary()">ZUSAMMENFASSEN</button>
            </div>
            <div id="summaryOutput" style="margin-top:15px; font-size: 0.85rem; color: var(--text-muted); display:none; line-height: 1.5;"></div>
        </div>

        <div class="glass-panel editor-area">
            <div style="display: flex; gap: 10px; margin-bottom: 5px;">
                <button class="btn-ui" onclick="insertTag('[hide]','[/hide]')">🔒 VERBERGEN</button>
                <button class="btn-ui" onclick="updateBoardMood()">🎭 STIMMUNG</button>
            </div>
            <textarea id="mainEditor" placeholder="Schreib etwas, Scanmaster..."></textarea>
            <button onclick="savePost()" style="width:100%; padding: 15px; background: var(--gradient-premium); border:none; border-radius: 12px; color:white; font-weight:900; cursor:pointer; text-transform: uppercase; letter-spacing: 1px;">POSTEN</button>
        </div>

        <div id="postContainer"></div>
    </div>

    <footer style="text-align: center; padding: 50px; color: var(--text-muted); font-size: 0.7rem; letter-spacing: 1px;">
        &copy; 2026 FUNBOARD &bull; ERSTELLT VON <b>SCANMASTER</b>
    </footer>

    <div id="masterConsole">
        [SYSTEM] NEURAL-GHOST: <input type="range" min="0" max="10" value="0" oninput="applyGhostMode(this.value)">
        | BEDIENER: SCANMASTER | STATUS: FUNBOARD ONLINE
    </div>

    <script>
        let posts = JSON.parse(localStorage.getItem('funboard_posts') || '[]');

        function savePost() {
            const el = document.getElementById('mainEditor');
            const content = el.value.trim();
            if(!content) return;
            
            const newPost = {
                id: Date.now(),
                content: content,
                timestamp: new Date().toLocaleString('de-DE'),
                author: 'Scanmaster'
            };
            
            posts.unshift(newPost);
            localStorage.setItem('funboard_posts', JSON.stringify(posts));
            el.value = '';
            renderPosts();
        }

        function renderPosts() {
            const container = document.getElementById('postContainer');
            if(posts.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding:50px; opacity:0.3; font-family:'Geist Mono';">BEREIT FÜR EINGABE.</div>`;
                return;
            }
            container.innerHTML = posts.map(post => `
                <div class="glass-panel post-card">
                    <div style="display:flex; justify-content:space-between; font-size:0.65rem; color:var(--ai-primary); margin-bottom:15px; font-family:'Geist Mono';">
                        <span>OPERATOR: ${post.author.toUpperCase()}</span>
                        <span>DATENSTAMP: ${post.timestamp}</span>
                    </div>
                    <div style="line-height:1.6; font-size:0.95rem;">${parseContent(post.content)}</div>
                </div>
            `).join('');
        }

        function parseContent(text) {
            return text.replace(/\[hide\](.*?)\[\/hide\]/g, '<span class="hidden-text" onclick="this.classList.toggle(\'revealed\')">$1</span>');
        }

        function generateSummary()
